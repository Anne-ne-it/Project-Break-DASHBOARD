<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" type="cohete/png" href="assets/logos/cohetehome.png">
    <title>Dashboard</title>
</head>

<body class="dashboard">
    <main>

        <section class="links-section" id="linksSection">
            <div class="likns-titulo" id="linksTitulo">
                <p>Copia aquí tu enlace de interés</p>
                <img src="../assets/logos/links.jpg" alt="links">
            </div>
            <div class="input-links" id="inputLinks">
                <input type="text" id="nombre-input" placeholder="Nombre para tu enlace" required>
                <input type="text" id="url-input" placeholder="Añade aquí la url de interés" required>
                <button class="boton-agregar" id="botonAgregar">Añadir enlace</button>
            </div>
            <ul class="links-container" id="linksContainer"></ul>
        </section>        

        <section class="tiempo-container" id="tiempoContainer">
            <article class="reloj" id="reloj">
                <div class="hora" id="hora"></div>
                <div class="fecha" id="fecha"></div>
                <div class="mensaje-reloj" id="mensajeReloj"></div>
            </article>

            <article class="clima" id="clima">
                <div class="clima-actual" id="climaActual"></div>
                <div class="clima-futuro" id="climaFuturo"></div>
            </article>
        </section>

        <section class="clave-container" id="claveContainer">
            <article class="clave" id="calve">
                        <div class="clave-titulo" id="claveTitulo">
                    <p>Crea tu contraseña segura</p>
                    <img src="../assets/logos/contraseña.jpg" alt="candado">
                </div>
                <div class="formulario-clave" id="formularioClave">
                    <label for="length">Número de caracteres de la Contraseña</label>
                    <input type="number" id="length" name="length" min="12" max="50" value="12">
                    <button type="button" onclick="generarclave()">Generar Contraseña</button>
                    <div class="resultado-calve" id="resultadoClave"></div>
                </div>
            </article>
        </section>

        <footer class="footer-menu" id="footerMenu"></footer>
    </main>

    <script type="module" src="javascript/main.js"></script>
  
</body>

</html>
