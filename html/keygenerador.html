<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="icon" type="cohete/png" href="../assets/logos/cohetehome.png">
    <title>Key Generator</title>
    
</head>

<body>
    <header class="go-home" id="goHome"></header>
    
    <main class="main">
        <section>
            <article class="clave" id="calve">
                <div class="clave-titulo" id="claveTitulo">
                    <p>Crea tu contraseña segura</p>
                    <img src="../assets/logos/contraseña.jpg" alt="candado">
                </div>
                <div class="formulario-clave" id="formularioClave">
                    <label for="length">Caracteres de la Contraseña</label>
                    <input type="number" id="length" name="length" min="12" max="50" value="12">
                    <button type="button">Generar Contraseña</button>
                    <div class="resultado-calve" id="resultadoClave"></div>
                </div>
            </article>
        </section>
        
        <footer class="footer-menu" id="footerMenu"></footer>

    </main>

    <script type="module" src="../javascript/main.js"></script>
  
</body>

</html>
